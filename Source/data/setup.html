<!DOCTYPE HTML>
<html>

<head>
    <title>ESP32PP Setup</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="setup.css">
</head>

<body>
    <h1>⚙️ ESP32 PP Setup</h1>
    <h2 style="margin-bottom: 20px;"><a href="/pinconfig.html">🔌 Pin Setup</a></h2>
    <form method="post">
        <div class="form-section">
            <p>🏷️ Host Name:</p>
            <input type="text" maxlength="60" name="wifiHostName" value="%s" />
        </div>
        <div class="form-section">
            <p>📡 Wi-Fi AP</p>
            <label>SSID:</label>
            <input type="text" maxlength="60" name="wifiAPSSID" value="%s" />
            <label>Password:</label>
            <input type="text" maxlength="60" name="wifiAPPASS" value="%s" />
        </div>
        <div class="form-section">
            <p>📶 Wi-Fi STA</p>
            <label>SSID:</label>
            <input type="text" maxlength="60" name="wifiStaSSID" value="%s" />
            <label>Password:</label>
            <input type="text" maxlength="60" name="wifiStaPASS" value="%s" />
        </div>
        <div class="form-section">
            <p>🔧 Miscellaneous</p>
            <label>RGB Brightness (%):</label>
            <input type="number" min="0" max="100" step="1" name="rgb_brightness" value="%d" />
            <label>Magnetic Declination Angle:</label>
            <input type="number" min="0" max="365" step="0.1" name="declinationAngle" value="%0.1f" />
            <i>Find Declination angle for your location here: <a
                    href="https://www.ngdc.noaa.gov/geomag/calculators/magcalc.shtml" target="_blank">noaa.gov</a></i>
            <label style="margin-top: 20px;">GPS Baud Rate:</label>
            <select id="gps_baud" name="gps_baud">
                <option value="1200">1200</option>
                <option value="2400">2400</option>
                <option value="4800">4800</option>
                <option value="9600">9600</option>
                <option value="19200">19200</option>
                <option value="38400">38400</option>
                <option value="57600">57600</option>
                <option value="115200">115200</option>
            </select>
        </div>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                document.getElementById('gps_baud').value = '%d';
            });
        </script>
        <div class="actions">
            <input type="submit" name="submit" value="💾 Save" />
            <a href="/" style="padding: 12px 24px; background-color: #333; color: white; border-radius: 6px; text-decoration: none;">❌ Cancel</a>
        </div>
    </form>
    <div class="info-text" style="background-color: #1e1e1e; padding: 15px; border-radius: 10px; max-width: 600px; margin: 20px auto;">
        ℹ️ Wi-Fi changes require rebooting the ESP to apply.<br /><br />
        <a href="/ota.html" style="display: inline-block; background-color: #bb86fc; color: black; padding: 10px 20px; border-radius: 6px; font-weight: bold; text-decoration: none;">🔄 OTA Update ESP</a>
    </div>
</body>

</html>
